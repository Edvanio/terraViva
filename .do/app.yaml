name: terra-viva
region: nyc

services:
  - name: app
    # Constrói a partir do Dockerfile.unified na raiz do repositório
    dockerfile_path: Dockerfile
    github:
      branch: develop
      deploy_on_push: true
    http_port: 80
    instance_count: 1
    instance_size_slug: basic-xxs   # $12/mês — ajuste conforme necessidade

    envs:
      # ── MongoDB ─────────────────────────────────────────────────
      - key: MONGODB_URL
        scope: RUN_TIME
        type: SECRET

      - key: MONGODB_DB_NAME
        scope: RUN_TIME
        value: terra_viva

      # ── JWT ──────────────────────────────────────────────────────
      - key: SECRET_KEY
        scope: RUN_TIME
        type: SECRET

      - key: ALGORITHM
        scope: RUN_TIME
        value: HS256

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        scope: RUN_TIME
        value: "10080"

      # ── CORS (adicione o domínio do app após o deploy) ───────────
      - key: CORS_ORIGINS
        scope: RUN_TIME
        value: "http://localhost,http://localhost:3000,https://terra-viva-3n3ko.ondigitalocean.app,https://terra-viva-vnvaf.ondigitalocean.app"

      # ── OTP padrão (remova em produção real) ─────────────────────
      - key: DEV_OTP_DEFAULT
        scope: RUN_TIME
        value: "123456"

      # ── DigitalOcean Spaces ──────────────────────────────────────
      - key: DO_SPACES_KEY
        scope: RUN_TIME
        type: SECRET

      - key: DO_SPACES_SECRET
        scope: RUN_TIME
        type: SECRET

      - key: DO_SPACES_ENDPOINT
        scope: RUN_TIME
        value: https://nyc3.digitaloceanspaces.com

      - key: DO_SPACES_REGION
        scope: RUN_TIME
        value: us-east-1

      - key: DO_SPACES_BUCKET
        scope: RUN_TIME
        value: dadosbimdoctor

      - key: DO_SPACES_FOLDER
        scope: RUN_TIME
        value: terraviva/profiles

      - key: DO_SPACES_PRODUCTS_FOLDER
        scope: RUN_TIME
        value: terraviva/products

      # ── OpenAI ──────────────────────────────────────────────────
      - key: OPENAI_API_KEY
        scope: RUN_TIME
        type: SECRET

      - key: OPENAI_VISION_MODEL
        scope: RUN_TIME
        value: gpt-4o

      - key: OPENAI_IMAGE_MODEL
        scope: RUN_TIME
        value: gpt-image-1

      # ── Next.js URL interna (mesmo container via nginx) ──────────
      - key: API_INTERNAL_URL
        scope: RUN_TIME
        value: http://127.0.0.1:8000

      - key: NEXT_PUBLIC_API_URL
        scope: BUILD_TIME
        value: /api
