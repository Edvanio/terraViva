services:
  backend:
    build:
      context: ./backend
    container_name: terra-viva-backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    networks:
      - terra-viva-net

  web:
    build:
      context: ./web
    container_name: terra-viva-web
    env_file:
      - ./web/.env
    environment:
      - API_INTERNAL_URL=http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - terra-viva-net

  nginx:
    image: nginx:1.27-alpine
    container_name: terra-viva-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/terra-viva.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - web
    networks:
      - terra-viva-net

volumes:
  uploads_data:

networks:
  terra-viva-net:
    driver: bridge
